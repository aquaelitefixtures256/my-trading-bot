<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>VOID Beast Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{font-family:Inter,Arial,sans-serif;margin:0;padding:0;background:#071032;color:#e6eef8}
    .top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#021028}
    .container{display:grid;grid-template-columns:1fr 360px;gap:12px;padding:12px}
    .card{background:#07142a;padding:12px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.5)}
    .small{font-size:13px;color:#98a0b3}
    ul{list-style:none;padding-left:0}
    li{padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
    button{padding:8px 12px;border-radius:6px;border:0;cursor:pointer}
    .btn-green{background:#0ea5a4;color:#001}
    .btn-red{background:#ef4444;color:#fff}
  </style>
</head>
<body>
  <div class="top">
    <div><strong>VOID Beast Command Center</strong> <span class="small" id="connLabel">(disconnected)</span></div>
    <div id="controls" class="small">
      <button id="btnLogin">Admin Login</button>
      <button id="btnStart" style="display:none" class="btn-green">Start Bot</button>
      <button id="btnStop" style="display:none" class="btn-red">Stop Bot</button>
    </div>
  </div>

  <div class="container">
    <div>
      <div class="card">
        <h3>Live PnL</h3>
        <canvas id="pnlChart" height="160"></canvas>
      </div>

      <div class="card" style="margin-top:12px">
        <h3>Open Trades</h3>
        <ul id="open_trades"></ul>
      </div>

      <div class="card" style="margin-top:12px">
        <h3>Closed Trades</h3>
        <ul id="closed_trades"></ul>
      </div>
    </div>

    <div>
      <div class="card">
        <h3>Logs / Errors</h3>
        <div style="max-height:360px;overflow:auto"><ul id="logs"></ul></div>
      </div>

      <div class="card" style="margin-top:12px">
        <h3>Bot Status</h3>
        <div id="bot_info">unknown</div>
        <div class="small" style="margin-top:8px">Last event: <span id="last_event">none</span></div>
      </div>

      <div class="card" style="margin-top:12px">
        <h3>Controls</h3>
        <div>Server: <span id="server_url">/</span></div>
      </div>
    </div>
  </div>

  <!-- Login modal (simple) -->
  <div id="loginModal" style="display:none;position:fixed;left:0;top:0;right:0;bottom:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center">
    <div style="background:#081026;padding:18px;border-radius:8px;width:320px">
      <h3>Admin Login</h3>
      <div style="margin-top:8px">
        <input id="inpUser" placeholder="username" style="width:100%;padding:8px;margin-bottom:8px" />
        <input id="inpPass" type="password" placeholder="password" style="width:100%;padding:8px;margin-bottom:8px" />
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button id="btnCancel">Cancel</button>
          <button id="btnSubmit" class="btn-green">Login</button>
        </div>
      </div>
    </div>
  </div>

<script>
const API_BASE = location.origin;
let token = null;
let socket = null;

// PnL chart
const pnlCtx = document.getElementById('pnlChart').getContext('2d');
const pnlChart = new Chart(pnlCtx, {
  type: 'line',
  data: { labels: [], datasets: [{ label: 'PnL', data: [], fill: true }] },
  options: { scales: { x: { display: true }, y: { display: true } } }
});

function addLog(level, msg){
  const ul = document.getElementById('logs');
  const li = document.createElement('li');
  li.textContent = `[${level}] ${msg}`;
  ul.prepend(li);
}

function addTradeOpen(t){
  const openEl = document.getElementById('open_trades');
  const li = document.createElement('li');
  li.textContent = `${t.symbol} ${t.direction} ${t.lot} @ ${t.open_price}`;
  openEl.prepend(li);
}
function addTradeClose(t){
  const closedEl = document.getElementById('closed_trades');
  const li = document.createElement('li');
  li.textContent = `${t.symbol} PnL ${t.profit}`;
  closedEl.prepend(li);
  pnlChart.data.labels.push(new Date().toLocaleTimeString());
  pnlChart.data.datasets[0].data.push(t.profit || 0);
  if(pnlChart.data.labels.length > 40){ pnlChart.data.labels.shift(); pnlChart.data.datasets[0].data.shift(); }
  pnlChart.update();
}

function updateBotInfo(){
  fetch(API_BASE + '/status').then(r=>r.json()).then(s=>{
    document.getElementById('bot_info').textContent = JSON.stringify(s.bot);
    const last = s.last_event? new Date(s.last_event*1000).toLocaleString() : 'none';
    document.getElementById('last_event').textContent = last;
    const connLabel = document.getElementById('connLabel');
    if(s.last_event && (Date.now()/1000 - s.last_event) < 30) connLabel.textContent = 'connected (events incoming)';
    else if(s.bot.running) connLabel.textContent = 'bot running';
    else connLabel.textContent = 'disconnected';
  });
}

function connectWS(){
  socket = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws');
  socket.onopen = ()=>{ console.log('ws open'); updateBotInfo(); };
  socket.onclose = ()=>{ console.log('ws close'); setTimeout(connectWS, 2000); };
  socket.onmessage = (evt)=> {
    const msg = JSON.parse(evt.data);
    if(msg.type === 'log') addLog('LOG', msg.payload.message || JSON.stringify(msg.payload));
    if(msg.type === 'error') addLog('ERR', msg.payload.message || JSON.stringify(msg.payload));
    if(msg.type === 'trade_open') addTradeOpen(msg.payload);
    if(msg.type === 'trade_close') addTradeClose(msg.payload);
    if(msg.type === 'control') addLog('CTL', JSON.stringify(msg.payload));
  };
}
connectWS();
updateBotInfo();
setInterval(updateBotInfo, 10000);

document.getElementById('btnLogin').addEventListener('click', ()=>{ document.getElementById('loginModal').style.display='flex'; });
document.getElementById('btnCancel').addEventListener('click', ()=>{ document.getElementById('loginModal').style.display='none'; });
document.getElementById('btnSubmit').addEventListener('click', async ()=>{
  const username = document.getElementById('inpUser').value;
  const password = document.getElementById('inpPass').value;
  const res = await fetch(API_BASE + '/auth/login', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username,password})
  });
  if(res.status === 200){
    const j = await res.json(); token = j.access_token;
    document.getElementById('loginModal').style.display='none';
    document.getElementById('btnStart').style.display='inline-block';
    document.getElementById('btnStop').style.display='inline-block';
    document.getElementById('btnLogin').style.display='none';
  } else {
    alert('login failed');
  }
});

document.getElementById('btnStart').addEventListener('click', async ()=>{
  const res = await fetch(API_BASE + '/control/start', {method: 'POST', headers: {'Authorization':'Bearer '+token}});
  const j = await res.json(); addLog('CTL','start -> '+JSON.stringify(j));
  updateBotInfo();
});
document.getElementById('btnStop').addEventListener('click', async ()=>{
  const res = await fetch(API_BASE + '/control/stop', {method: 'POST', headers: {'Authorization':'Bearer '+token}});
  const j = await res.json(); addLog('CTL','stop -> '+JSON.stringify(j));
  updateBotInfo();
});
</script>
</body>
</html>
